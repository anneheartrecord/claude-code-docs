<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Claude Code 源码解析</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="基于 Anthropic Claude Code 泄露源码的深度技术分析">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/anthropics/anthropic-cookbook@main/assets/favicon.ico" type="image/x-icon">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #d97706;
    }
    .sidebar-nav li a {
      font-size: 14px;
    }
    .markdown-section {
      max-width: 900px;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    .app-name-link {
      font-size: 18px !important;
      font-weight: bold;
    }
    .app-name-link img {
      vertical-align: middle;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: '<img src="https://claude.ai/favicon.ico" width="24" height="24" alt="Claude"> Claude Code 源码解析',
      nameLink: '/',
      repo: 'https://github.com/anneheartrecord/claude-code-docs',
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        placeholder: '搜索文档...',
        noData: '没有找到结果',
        depth: 3,
      },
      auto2top: true,
      coverpage: false,
      relativePath: true,
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
</body>
</html>
